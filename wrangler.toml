name = "mail-relay"
main = "src/index.ts"
compatibility_date = "2026-06-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
# /api/* 与 /r2sign/* 先走 Worker，其余路径先走静态资源（SPA 兜底）
run_worker_first = ["/api/*", "/r2sign/*"]

[[r2_buckets]]
binding = "MAIL_R2"
bucket_name = "mail-relay"

[[durable_objects.bindings]]
name = "MAILBOX"
class_name = "MailboxDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MailboxDO"]

# Secrets（不写在此处，通过 wrangler secret put 注入）：
#   CONFIG_MASTER_KEY   —— AES-GCM 加密 Provider 配置的主密钥
#   SESSION_SECRET      —— HMAC session cookie 签名
#   ADMIN_PASSWORD_HASH —— 登录口令的 SHA-256 哈希（hex）

[vars]
# 每日发送配额上限（Resend 免费档 100/天）
DAILY_SEND_LIMIT = "100"
# 邮件正文外置 R2 的阈值（字节），超过则 body_html 落 R2
BODY_INLINE_MAX = "262144"
# 登录失败锁定阈值与时长（秒）
LOGIN_MAX_FAILS = "5"
LOGIN_LOCK_SECONDS = "900"
